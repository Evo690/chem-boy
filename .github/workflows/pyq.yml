name: Run Physics PYQ Light Scraper

on:
  workflow_dispatch: # Allows you to run the scraper manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install required libraries
    - name: Install Dependencies
      run: |
        python -m pip install requests

    # 4. Run the scraper with unbuffered output (-u)
    - name: Run Scraper
      run: |
        python -u pyqLightSc.py

    # 5. Upload data as an Artifact (Runs ALWAYS, even if the scraper crashes or is stopped)
    - name: Upload Data as Artifact
      uses: actions/upload-artifact@v4
      if: always() # Ensures backup is saved even if the job fails or is cancelled
      with:
        name: advanced-subjects-light-pyq-scraped-data
        path: data/
        retention-days: 30 # Keeps the zip file download available for 30 days
